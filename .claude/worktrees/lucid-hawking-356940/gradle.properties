# Project-wide Gradle settings.

# Keep daemon memory conservative for local development.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8

# Parallel project execution improves build speed in this multi-module setup.
org.gradle.parallel=true

# Configuration cache is disabled because AGP JdkImage transform is unstable
# in this environment and causes intermittent jlink-related failures.
org.gradle.configuration-cache=false

# Pin Gradle to a full JDK that includes jlink (avoid embedded extension JREs).
org.gradle.java.home=C:/Program Files/Java/jdk-21

android.useAndroidX=true
android.nonTransitiveRClass=true