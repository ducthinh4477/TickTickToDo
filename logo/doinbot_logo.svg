<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Main gradient: deep indigo → violet -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <!-- Accent gradient: cyan → teal for the check arc -->
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
    <!-- Shine overlay -->
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="60%"  stop-color="#ffffff" stop-opacity="0.0"/>
    </linearGradient>
    <!-- Inner shadow for depth -->
    <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feOffset dx="0" dy="4" result="offsetBlur"/>
      <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
    </filter>
    <!-- Drop shadow for robot body -->
    <filter id="dropShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1e1b4b" flood-opacity="0.35"/>
    </filter>
    <!-- Glow for check mark -->
    <filter id="glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Background rounded square ── -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>
  <!-- Shine overlay -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#shineGrad)"/>

  <!-- ── Subtle grid pattern (brain / circuit hint) ── -->
  <g opacity="0.07" stroke="#ffffff" stroke-width="1.5">
    <!-- Horizontal lines -->
    <line x1="60"  y1="130" x2="452" y2="130"/>
    <line x1="60"  y1="200" x2="452" y2="200"/>
    <line x1="60"  y1="380" x2="452" y2="380"/>
    <!-- Vertical lines -->
    <line x1="130" y1="60"  x2="130" y2="452"/>
    <line x1="382" y1="60"  x2="382" y2="452"/>
  </g>

  <!-- ═══════════════════════════════════
       ROBOT HEAD
       ═══════════════════════════════════ -->
  <!-- Antenna stem -->
  <rect x="248" y="82" width="16" height="36" rx="8" fill="#C4B5FD"/>
  <!-- Antenna ball -->
  <circle cx="256" cy="76" r="14" fill="#A78BFA"/>
  <circle cx="256" cy="76" r="6"  fill="#E0D9FF"/>

  <!-- Head body — white card with soft radius -->
  <rect x="114" y="116" width="284" height="200" rx="36" ry="36"
        fill="#ffffff" filter="url(#dropShadow)"/>

  <!-- ── Eyes ── -->
  <!-- Left eye housing -->
  <rect x="148" y="158" width="84" height="72" rx="20" fill="#EDE9FE"/>
  <!-- Left pupil — indigo circle -->
  <circle cx="190" cy="194" r="24" fill="url(#bgGrad)"/>
  <!-- Left pupil shine -->
  <circle cx="200" cy="182" r="7"  fill="#ffffff" opacity="0.6"/>
  <!-- Left blink line (lash hint) -->
  <rect x="172" y="152" width="36" height="4" rx="2" fill="#7C3AED" opacity="0.25"/>

  <!-- Right eye housing -->
  <rect x="280" y="158" width="84" height="72" rx="20" fill="#EDE9FE"/>
  <!-- Right pupil -->
  <circle cx="322" cy="194" r="24" fill="url(#bgGrad)"/>
  <!-- Right pupil shine -->
  <circle cx="332" cy="182" r="7"  fill="#ffffff" opacity="0.6"/>

  <!-- ── Mouth — friendly curved arc ── -->
  <path d="M 186 252 Q 256 290 326 252"
        stroke="#C4B5FD" stroke-width="6" stroke-linecap="round"
        fill="none"/>

  <!-- Ear nodes (connector dots) -->
  <circle cx="114" cy="216" r="12" fill="#DDD6FE"/>
  <circle cx="114" cy="216" r="6"  fill="#7C3AED"/>
  <circle cx="398" cy="216" r="12" fill="#DDD6FE"/>
  <circle cx="398" cy="216" r="6"  fill="#7C3AED"/>

  <!-- ═══════════════════════════════════
       TASK CHECKLIST BODY (below head)
       ═══════════════════════════════════ -->
  <!-- Body card -->
  <rect x="114" y="330" width="284" height="128" rx="24" ry="24"
        fill="#ffffff" opacity="0.95" filter="url(#dropShadow)"/>

  <!-- Task row 1 — completed (cyan check) -->
  <!-- Circle check -->
  <circle cx="152" cy="364" r="14" fill="url(#checkGrad)" filter="url(#glow)"/>
  <polyline points="144,364 150,371 162,355"
            stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"
            stroke-linejoin="round" fill="none"/>
  <!-- Line text placeholder (struck-through) -->
  <rect x="178" y="358" width="148" height="8" rx="4" fill="#CBD5E1"/>
  <rect x="178" y="358" width="148" height="8" rx="4" fill="#94A3B8" opacity="0.4"/>
  <!-- Strike-through -->
  <line x1="178" y1="362" x2="326" y2="362" stroke="#94A3B8" stroke-width="2.5"
        stroke-linecap="round"/>
  <!-- Priority dot -->
  <circle cx="346" cy="362" r="5" fill="#0D9488"/>

  <!-- Task row 2 — in progress (indigo ring) -->
  <circle cx="152" cy="404" r="14" fill="none" stroke="url(#bgGrad)" stroke-width="3"/>
  <!-- Partial arc fill (progress) -->
  <path d="M 152 390 A 14 14 0 1 1 138 404"
        fill="none" stroke="url(#checkGrad)" stroke-width="3.5"
        stroke-linecap="round"/>
  <rect x="178" y="398" width="120" height="8" rx="4" fill="#E2E8F0"/>
  <circle cx="350" cy="402" r="5" fill="#4F46E5"/>

  <!-- Task row 3 — pending (empty ring) -->
  <circle cx="152" cy="442" r="14" fill="none" stroke="#CBD5E1" stroke-width="3"/>
  <rect x="178" y="436" width="90" height="8" rx="4" fill="#F1F5F9"/>
  <circle cx="350" cy="440" r="5" fill="#F59E0B" opacity="0.7"/>

  <!-- ═══════════════════════════════════
       WORDMARK: DoinBot
       ═══════════════════════════════════ -->
  <!-- White pill behind wordmark for contrast -->
  <rect x="118" y="468" width="276" height="34" rx="17" fill="#ffffff" opacity="0.12"/>
  <text x="256" y="491"
        font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="26" font-weight="800" letter-spacing="1.5"
        text-anchor="middle" fill="#ffffff">
    Doin<tspan fill="#A5F3FC">Bot</tspan>
  </text>

</svg>
