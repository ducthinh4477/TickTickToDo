<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <!--
    DoinBot — Horizontal Wordmark
    Usage: website header, splash screen, marketing materials
    Background: transparent (works on dark or light)
  -->
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="eyeG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="checkG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
  </defs>

  <!-- ── Icon mark (left side) ── -->
  <!-- Background pill -->
  <rect x="0" y="10" width="100" height="100" rx="24" fill="url(#iconBg)"/>

  <!-- Antenna -->
  <rect x="48" y="14" width="4" height="10" rx="2" fill="#C4B5FD"/>
  <circle cx="50" cy="13" r="4" fill="#A78BFA"/>
  <circle cx="50" cy="13" r="2" fill="#E0D9FF"/>

  <!-- Head -->
  <rect x="14" y="24" width="72" height="46" rx="11" fill="#ffffff"/>

  <!-- Left eye -->
  <rect x="22" y="33" width="22" height="18" rx="6" fill="#EDE9FE"/>
  <circle cx="33" cy="42" r="7" fill="url(#eyeG)"/>
  <circle cx="37" cy="37" r="3" fill="#ffffff" opacity="0.6"/>

  <!-- Right eye -->
  <rect x="56" y="33" width="22" height="18" rx="6" fill="#EDE9FE"/>
  <circle cx="67" cy="42" r="7" fill="url(#eyeG)"/>
  <circle cx="71" cy="37" r="3" fill="#ffffff" opacity="0.6"/>

  <!-- Mouth -->
  <path d="M 30 57 Q 50 67 70 57"
        stroke="#C4B5FD" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- Ear nodes -->
  <circle cx="14" cy="47" r="4" fill="#DDD6FE"/>
  <circle cx="14" cy="47" r="2" fill="#7C3AED"/>
  <circle cx="86" cy="47" r="4" fill="#DDD6FE"/>
  <circle cx="86" cy="47" r="2" fill="#7C3AED"/>

  <!-- Checklist strip -->
  <rect x="14" y="76" width="72" height="26" rx="7" fill="#ffffff" opacity="0.95"/>

  <!-- Check row -->
  <circle cx="25" cy="85" r="5" fill="url(#checkG)"/>
  <polyline points="22,85 24.5,88 29,81"
            stroke="#fff" stroke-width="1.8" stroke-linecap="round"
            stroke-linejoin="round" fill="none"/>
  <rect x="34" y="83" width="34" height="3.5" rx="2" fill="#CBD5E1"/>
  <line x1="34" y1="84.8" x2="68" y2="84.8" stroke="#94A3B8" stroke-width="1.5"/>

  <!-- Pending row -->
  <circle cx="25" cy="96" r="5" fill="none" stroke="#A78BFA" stroke-width="2"/>
  <rect x="34" y="94" width="24" height="3.5" rx="2" fill="#E2E8F0"/>

  <!-- ── Wordmark text (right side) ── -->
  <!-- "Doin" in dark indigo -->
  <text x="118" y="77"
        font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="52" font-weight="800" letter-spacing="-1"
        fill="#1E1B4B">Doin</text>
  <!-- "Bot" in gradient violet -->
  <text x="248" y="77"
        font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="52" font-weight="800" letter-spacing="-1"
        fill="url(#iconBg)">Bot</text>
  <!-- Tagline -->
  <text x="119" y="97"
        font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
        font-size="14" font-weight="400" letter-spacing="0.5"
        fill="#6D28D9" opacity="0.75">AI-powered task management</text>

  <!-- Small dot accent between Doin and Bot (like the eye) -->
  <circle cx="244" cy="62" r="5" fill="#06B6D4"/>

</svg>
