<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="108" height="108">
  <!--
    Android Adaptive Icon — Foreground layer
    Safe zone: center 72×72 (inset 18dp all sides)
    Background color should be #4F46E5 (set in ic_launcher_background)
  -->
  <defs>
    <linearGradient id="eyeG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="checkG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
  </defs>

  <!-- Antenna -->
  <rect x="52" y="14" width="4" height="10" rx="2" fill="#C4B5FD"/>
  <circle cx="54" cy="13" r="4" fill="#A78BFA"/>

  <!-- Head -->
  <rect x="22" y="23" width="64" height="44" rx="10" fill="#ffffff"/>

  <!-- Left eye -->
  <rect x="30" y="31" width="20" height="17" rx="5" fill="#EDE9FE"/>
  <circle cx="40" cy="39" r="7" fill="url(#eyeG)"/>
  <circle cx="43" cy="35" r="2.5" fill="#ffffff" opacity="0.65"/>

  <!-- Right eye -->
  <rect x="58" y="31" width="20" height="17" rx="5" fill="#EDE9FE"/>
  <circle cx="68" cy="39" r="7" fill="url(#eyeG)"/>
  <circle cx="71" cy="35" r="2.5" fill="#ffffff" opacity="0.65"/>

  <!-- Mouth -->
  <path d="M 38 55 Q 54 63 70 55" stroke="#C4B5FD" stroke-width="2"
        stroke-linecap="round" fill="none"/>

  <!-- Ear dots -->
  <circle cx="22" cy="45" r="3.5" fill="#A78BFA"/>
  <circle cx="86" cy="45" r="3.5" fill="#A78BFA"/>

  <!-- Checklist body -->
  <rect x="22" y="72" width="64" height="26" rx="6" fill="#ffffff" opacity="0.95"/>

  <!-- Row 1: check -->
  <circle cx="32" cy="81" r="4" fill="url(#checkG)"/>
  <polyline points="29.5,81 31.5,83.5 35,78.5"
            stroke="#fff" stroke-width="1.5" stroke-linecap="round"
            stroke-linejoin="round" fill="none"/>
  <rect x="39" y="79" width="30" height="3" rx="1.5" fill="#CBD5E1"/>
  <line x1="39" y1="80.5" x2="69" y2="80.5" stroke="#94A3B8" stroke-width="1.5"/>

  <!-- Row 2: pending -->
  <circle cx="32" cy="92" r="4" fill="none" stroke="#A78BFA" stroke-width="1.5"/>
  <rect x="39" y="90" width="22" height="3" rx="1.5" fill="#E2E8F0"/>
</svg>
